services:
  - type: web
    name: agentlogs-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  - type: web
    name: agentlogs-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .