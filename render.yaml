services:
  - type: web
    name: agentlogs-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000

  - type: web
    name: agentlogs-frontend
    env: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .